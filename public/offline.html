<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09090B" />
  <title>OnlyBae — Offline</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #09090B;
      color: #FAFAFA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      background: #18181B;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo img { width: 48px; height: 48px; border-radius: 12px; }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 0.95rem;
      color: #A1A1AA;
      max-width: 22rem;
      margin: 0 0 2rem;
      line-height: 1.5;
    }
    button {
      height: 44px;
      padding: 0 1.5rem;
      border-radius: 10px;
      border: none;
      background: #EAB308;
      color: #09090B;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/logo.jpg" alt="" onerror="this.style.display='none'" />
    </div>
    <h1>You&rsquo;re offline</h1>
    <p>OnlyBae can&rsquo;t reach the server right now. Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
